server {
    listen 80;
    server_name _;

    # Проксирование API и webhook на бэкенд
    location /api/ {
        proxy_pass http://app:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /webhook {
        proxy_pass http://app:8000/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://app:8000/health;
    }

    # Mini App — раздача статики через root
    # Файлы лежат в /usr/share/nginx/html/app/ → URL /app/*
    location /app/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /app/index.html;
    }

    # Редирект /app → /app/
    location = /app {
        return 301 /app/;
    }

    # Корень → редирект на /app/
    location = / {
        return 301 /app/;
    }
}
